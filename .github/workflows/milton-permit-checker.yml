name: Milton Permit Checker

on:
  schedule:
    # Runs every 2 hours, Mon–Fri, between 8am–8pm Eastern (UTC-4 in summer)
    # Eastern 8am  = UTC 12:00
    # Eastern 10am = UTC 14:00
    # Eastern 12pm = UTC 16:00
    # Eastern 2pm  = UTC 18:00
    # Eastern 4pm  = UTC 20:00
    # Eastern 6pm  = UTC 22:00
    # Eastern 8pm  = UTC 00:00 (next UTC day, still weekday evening)
    - cron: '0 12,14,16,18,20,22 * * 1-5'
    - cron: '0 0 * * 2-6'   # midnight Tuesday–Saturday = Monday–Friday 8pm ET

  # Allow manual trigger anytime from GitHub Actions tab
  workflow_dispatch:

jobs:
  check-permit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run permit check
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python check_permit.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permit-screenshot-${{ github.run_number }}
          path: permit_check_screenshot.png
          retention-days: 7
